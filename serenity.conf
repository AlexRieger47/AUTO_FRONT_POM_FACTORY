serenity {
  project.name = "AUTO_FRONT_POM_FACTORY"
  take.screenshots = FOR_FAILURES
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless", "--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com"
  }
}
